<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>inicio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
<ion-card>
  <ion-card-header>
    <ion-card-title class="ion-text-center">Iniciar Sesión</ion-card-title>
  </ion-card-header>

    <ion-card-content>

      <!-- Correo electrónico -->
      <ion-item>
        <ion-label position="floating">Correo electrónico</ion-label>
        <ion-input type="email" maxlength="50"></ion-input>
      </ion-item>

      <!-- Contraseña -->
      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" maxlength="20"></ion-input>
      </ion-item>
      <ion-button expand = "block">Iniciar Sesión</ion-button>
      <ion-button expand = "block">Registrarse</ion-button>

    </ion-card-content>
  </ion-card>
</ion-content>
